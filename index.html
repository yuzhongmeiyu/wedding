<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的婚纱照</title>
<style>
  :root {
    --bg: #faf7f2;
    --card-bg: #ffffff;
    --text: #3d3226;
    --text-light: #8a7b6b;
    --accent: #c9a87c;
    --accent-deep: #a8885e;
    --accent-pale: #ede3d4;
    --shadow-sm: 0 1px 3px rgba(60,40,20,0.04);
    --shadow: 0 4px 24px rgba(60,40,20,0.06);
    --shadow-lg: 0 16px 48px rgba(60,40,20,0.10);
    --radius: 12px;
    --font-serif: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
    --font-sans: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(200,170,130,0.06) 0%, transparent 70%),
      radial-gradient(ellipse at 80% 100%, rgba(200,170,130,0.04) 0%, transparent 60%);
  }

  /* ═══════════ Loading ═══════════ */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-ring {
    width: 40px; height: 40px;
    border: 1.5px solid var(--accent-pale);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loader-text {
    margin-top: 16px;
    font-family: var(--font-serif);
    font-size: 0.85rem; color: var(--text-light);
    letter-spacing: 0.15em;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══════════ Hero ═══════════ */
  .hero {
    position: relative;
    height: 100vh; min-height: 600px; max-height: 900px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background: #2a2118;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: url('a12.jpg') center/cover no-repeat;
    filter: brightness(0.55) saturate(0.85);
    transform: scale(1.05);
    animation: heroZoom 8s ease-out forwards;
  }
  @keyframes heroZoom {
    from { transform: scale(1.15); }
    to   { transform: scale(1.05); }
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(30,20,10,0.25) 0%, rgba(20,12,6,0.5) 100%);
  }
  .hero-content {
    position: relative; z-index: 2; text-align: center; color: #fff;
  }
  .hero-content .ornament {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    margin: 0 auto 36px;
  }
  .hero-content h1 {
    font-family: var(--font-serif);
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 400;
    letter-spacing: 0.25em;
    margin-bottom: 16px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .hero-content .sub {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    opacity: 0.75;
  }
  .hero-content .date {
    margin-top: 28px;
    font-family: var(--font-serif);
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    opacity: 0.55;
  }
  .scroll-indicator {
    position: absolute; bottom: 40px; left: 50%; z-index: 2;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .scroll-indicator span {
    font-size: 0.7rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.5);
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(180deg, rgba(255,255,255,0.5), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine {
    0%,100% { transform: scaleY(0.5); opacity: 0; }
    50%     { transform: scaleY(1);   opacity: 1; }
  }

  /* ═══════════ Section divider ═══════════ */
  .section-title {
    text-align: center;
    padding: 72px 24px 16px;
    max-width: 1400px; margin: 0 auto;
  }
  .section-title h2 {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--text);
  }
  .section-title .dash {
    display: inline-block;
    width: 36px; height: 1px;
    background: var(--accent);
    vertical-align: middle;
    margin: 0 16px;
  }

  /* ═══════════ Gallery ═══════════ */
  .gallery-wrap {
    max-width: 1500px; margin: 0 auto;
    padding: 24px 48px 80px;
  }
  .gallery {
    columns: 3;
    column-gap: 36px;
  }

  .card {
    break-inside: avoid;
    margin-bottom: 36px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card-bg);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    position: relative;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1),
                transform 0.8s cubic-bezier(0.22,0.61,0.36,1),
                box-shadow 0.5s ease;
  }
  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  .card.visible:hover {
    transform: translateY(-2px);
  }
  .card img {
    display: block;
    width: 100%;
    height: auto;
    transition: transform 0.8s cubic-bezier(0.22,0.61,0.36,1);
    will-change: transform;
  }
  .card:hover img {
    transform: scale(1.05);
  }

  /* card number badge */
  .card .badge {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 0.7rem; color: var(--accent-deep);
    opacity: 0; transform: translateY(-4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .card:hover .badge {
    opacity: 1; transform: translateY(0);
  }

  /* ═══════════ Lightbox ═══════════ */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(18,14,10,0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    justify-content: center; align-items: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .lightbox.active {
    display: flex; opacity: 1;
  }
  .lightbox .lb-img-wrap {
    position: relative;
    max-width: 88vw; max-height: 82vh;
  }
  .lightbox .lb-img-wrap img {
    max-width: 88vw; max-height: 82vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: lbReveal 0.5s cubic-bezier(0.22,0.61,0.36,1);
  }
  @keyframes lbReveal {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .lb-close {
    position: fixed; top: 28px; right: 36px; z-index: 1002;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none; color: rgba(255,255,255,0.7);
    font-size: 1.4rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s, color 0.3s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .lb-nav {
    position: fixed; top: 50%; z-index: 1002;
    transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: none; color: rgba(255,255,255,0.6);
    font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s, color 0.3s;
    margin: 0 20px;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .lb-prev { left: 0; }
  .lb-next { right: 0; }

  .lb-counter {
    position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-family: var(--font-serif);
    font-size: 0.85rem; letter-spacing: 0.15em;
    z-index: 1002;
  }

  /* thumbnail strip */
  .lb-thumbs {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    z-index: 1002;
    display: flex; gap: 8px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.35);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    max-width: 90vw; overflow-x: auto;
    scrollbar-width: none;
  }
  .lb-thumbs::-webkit-scrollbar { display: none; }
  .lb-thumbs .thumb {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.3s, opacity 0.3s;
    opacity: 0.5; flex-shrink: 0;
  }
  .lb-thumbs .thumb.active {
    border-color: var(--accent); opacity: 1;
  }
  .lb-thumbs .thumb:hover { opacity: 0.9; }

  /* ═══════════ Back to top ═══════════ */
  .back-top {
    position: fixed; bottom: 36px; right: 36px; z-index: 99;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transform: translateY(12px);
    transition: opacity 0.4s, visibility 0.4s, transform 0.4s, box-shadow 0.3s;
    color: var(--text-light); font-size: 1.1rem;
  }
  .back-top.show {
    opacity: 1; visibility: visible; transform: translateY(0);
  }
  .back-top:hover { box-shadow: var(--shadow-lg); color: var(--accent-deep); }

  /* ═══════════ Footer ═══════════ */
  .footer {
    text-align: center;
    padding: 16px 20px 48px;
    color: var(--text-light);
    font-family: var(--font-serif);
    font-size: 0.95rem;
    letter-spacing: 0.15em;
  }
  .footer .ornament {
    width: 40px; height: 1px;
    background: var(--accent-pale);
    margin: 0 auto 20px;
  }

  /* ═══════════ Responsive ═══════════ */
  @media (max-width: 1100px) {
    .gallery { columns: 2; column-gap: 24px; }
    .card { margin-bottom: 24px; }
    .gallery-wrap { padding: 20px 28px 60px; }
  }
  @media (max-width: 600px) {
    .gallery { columns: 1; }
    .gallery-wrap { padding: 16px 16px 48px; }
    .card { margin-bottom: 20px; border-radius: 8px; }
    .hero-content .ornament { margin-bottom: 24px; }
    .lb-nav { width: 40px; height: 40px; margin: 0 8px; }
    .lb-thumbs { bottom: 60px; gap: 4px; padding: 6px 10px; }
    .lb-thumbs .thumb { width: 32px; height: 32px; }
    .lb-counter { bottom: 40px; }
    .back-top { bottom: 20px; right: 20px; width: 38px; height: 38px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loader">
  <div class="loader-ring"></div>
  <p class="loader-text">正在为您准备</p>
</div>

<!-- ═══════════ Hero ═══════════ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="ornament"></div>
    <h1>我们的婚纱照</h1>
    <p class="sub">执子之手 · 与子偕老</p>
  </div>
  <div class="scroll-indicator">
    <div class="scroll-line"></div>
    <span>向下浏览</span>
  </div>
</section>

<!-- ═══════════ Gallery ═══════════ -->
<div class="section-title">
  <span class="dash"></span><h2 style="display:inline;">时光印记</h2><span class="dash"></span>
</div>

<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
</div>

<div class="footer">
  <div class="ornament"></div>
  <p>执子之手，与子偕老</p>
</div>

<!-- Back to top -->
<button class="back-top" id="backTop" title="回到顶部">↑</button>

<!-- ═══════════ Lightbox ═══════════ -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
  <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
  <div class="lb-img-wrap"><img src="" alt="" id="lbImg"></div>
  <div class="lb-thumbs" id="lbThumbs"></div>
  <span class="lb-counter" id="lbCounter"></span>
</div>

<script>
const photos = [
  "a12.jpg","a14.jpg","a17.jpg","a39__.jpg","a41.jpg","a45.jpg","a48.jpg","a55.jpg",
  "b11.jpg","b18.jpg","b21.jpg","b23.jpg","b26.jpg","b30.jpg","b33.jpg","b42__.jpg",
  "b53.jpg","b57.jpg","b6.jpg",
  "c1.jpg","c14.jpg","c2.jpg","c20.jpg","c26.jpg","c31.jpg","c32.jpg","c43.jpg",
  "c5.jpg","c50_.jpg","c55.jpg","c61.jpg","c62.jpg","c64.jpg","c9.jpg",
  "d13.jpg","d23.jpg","d31.jpg","d32.jpg","d35.jpg","d36.jpg","d46.jpg","d52.jpg",
  "d53_.jpg","d54.jpg","d55.jpg","d8.jpg","d9.jpg",
  "e10__.jpg"
];

const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');
const lbThumbs = document.getElementById('lbThumbs');
let currentIdx = 0;

// ── Build gallery ──
photos.forEach((src, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.transitionDelay = `${(i % 9) * 0.06}s`;
  card.innerHTML = `
    <img src="${src}" alt="" loading="lazy">
    <span class="badge">${i + 1}</span>
  `;
  card.addEventListener('click', () => openLightbox(i));
  gallery.appendChild(card);
});

// ── Build thumbnail strip ──
photos.forEach((src, i) => {
  const thumb = document.createElement('img');
  thumb.src = src;
  thumb.className = 'thumb';
  thumb.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(i); });
  lbThumbs.appendChild(thumb);
});

// ── Intersection Observer ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '60px' });

document.querySelectorAll('.card').forEach(card => observer.observe(card));

// ── Back to top ──
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('show', window.scrollY > 500);
});
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── Loading ──
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 600);
});

// ── Lightbox ──
function openLightbox(idx) {
  currentIdx = idx;
  updateLightbox();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
  // scroll active thumb into view
  const thumbs = lbThumbs.querySelectorAll('.thumb');
  thumbs[currentIdx]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  currentIdx = (currentIdx + dir + photos.length) % photos.length;
  updateLightbox();
  const thumbs = lbThumbs.querySelectorAll('.thumb');
  thumbs[currentIdx]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function updateLightbox() {
  lbImg.src = photos[currentIdx];
  lbCounter.textContent = `${currentIdx + 1} / ${photos.length}`;
  const thumbs = lbThumbs.querySelectorAll('.thumb');
  thumbs.forEach((t, i) => t.classList.toggle('active', i === currentIdx));
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

lightbox.addEventListener('click', e => {
  if (e.target === lightbox) closeLightbox();
});

// Touch swipe
let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) navLightbox(dx < 0 ? 1 : -1);
});
</script>

</body>
</html>
