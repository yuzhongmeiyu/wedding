<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding · Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F7F4;
    --text: #2B2B2B;
    --muted: #7D7D7D;
    --hairline: #D8D5CE;
    --serif-en: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    --serif-cn: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", serif;
    --gap: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; background: var(--bg); }

  body {
    font-family: var(--serif-cn);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.7;
    letter-spacing: 0.12em;
    opacity: 0;
    animation: bodyIn 1s 0.3s ease forwards;
  }
  @keyframes bodyIn { to { opacity: 1; } }

  /* ═══════════ NAV ═══════════ */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 28px clamp(24px, 6vw, 80px);
    display: flex; justify-content: space-between; align-items: center;
    background: transparent;
  }
  nav .logo {
    font-family: var(--serif-en);
    font-size: 1rem; font-weight: 400; font-style: italic;
    color: rgba(255,255,255,0.85); letter-spacing: 0.08em;
  }
  nav .menu {
    display: flex; gap: 32px;
    font-family: var(--serif-en);
    font-size: 0.78rem; letter-spacing: 0.15em;
  }
  nav .menu a {
    color: rgba(255,255,255,0.7); text-decoration: none;
    transition: color 0.4s;
  }
  nav .menu a:hover { color: #fff; }
  nav .menu a.active { color: #fff; }

  /* ═══════════ HERO SLIDESHOW ═══════════ */
  .hero {
    position: relative; height: 100vh; min-height: 600px;
    overflow: hidden; background: #1a1a1a;
  }
  .hero .slide {
    position: absolute; inset: 0;
    background-size: cover; background-position: center 30%;
    opacity: 0; transition: opacity 1.8s ease;
    will-change: opacity;
  }
  .hero .slide.active { opacity: 1; }
  .hero .slide:nth-child(1) { background-image: url('a12.jpg'); }
  .hero .slide:nth-child(2) { background-image: url('d31.jpg'); }
  .hero .slide:nth-child(3) { background-image: url('d8.jpg'); }
  .hero .slide:nth-child(4) { background-image: url('c43.jpg'); }
  .hero .slide:nth-child(5) { background-image: url('c9.jpg'); }

  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.35) 0%, transparent 55%);
    z-index: 1;
  }
  .hero-text {
    position: absolute; bottom: clamp(60px, 12vh, 120px);
    left: clamp(24px, 6vw, 80px); z-index: 2;
  }
  .hero-text .kicker {
    font-family: var(--serif-en);
    font-size: 0.72rem; font-style: italic; letter-spacing: 0.22em;
    color: rgba(255,255,255,0.45); margin-bottom: 16px;
  }
  .hero-text h1 {
    font-family: var(--serif-cn);
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 200; letter-spacing: 0.18em;
    color: #fff; line-height: 1.2;
    text-shadow: 0 2px 30px rgba(0,0,0,0.3);
  }
  .hero-text .sub {
    font-family: var(--serif-en);
    font-size: 1rem; font-style: italic; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5); margin-top: 14px;
  }

  /* Slide indicators */
  .hero-dots {
    position: absolute; bottom: 40px; right: clamp(24px, 6vw, 80px);
    z-index: 2; display: flex; gap: 12px;
  }
  .hero-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer; transition: background 0.4s;
  }
  .hero-dots span.active { background: rgba(255,255,255,0.9); }

  /* ═══════════ CURATED MOMENTS ═══════════ */
  .section {
    padding: clamp(80px, 12vh, 140px) clamp(24px, 6vw, 80px);
    max-width: 1400px; margin: 0 auto;
  }
  .section-label {
    font-family: var(--serif-en);
    font-size: 0.7rem; font-style: italic; letter-spacing: 0.25em;
    color: var(--muted); margin-bottom: 32px;
  }
  .section-title {
    font-family: var(--serif-cn);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 200; letter-spacing: 0.16em;
    color: var(--text); margin-bottom: 56px;
  }

  /* 3x2 Grid */
  .grid-3x2 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto auto;
    gap: var(--gap);
  }
  .grid-3x2 .grid-item {
    position: relative; cursor: pointer; overflow: hidden;
    opacity: 0; transform: translateY(36px);
    transition: opacity 0.9s cubic-bezier(0.22,0.61,0.36,1),
                transform 0.9s cubic-bezier(0.22,0.61,0.36,1);
  }
  .grid-3x2 .grid-item.visible { opacity: 1; transform: translateY(0); }
  .grid-3x2 .grid-item img {
    display: block; width: 100%; height: auto;
    transition: transform 0.6s ease;
  }
  .grid-3x2 .grid-item:hover img { transform: scale(1.03); }
  .grid-3x2 .grid-item .tag {
    position: absolute; bottom: 16px; left: 16px;
    font-family: var(--serif-en);
    font-size: 0.65rem; font-style: italic; letter-spacing: 0.2em;
    color: rgba(255,255,255,0); transition: color 0.45s ease;
    pointer-events: none;
  }
  .grid-3x2 .grid-item:hover .tag {
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  /* ═══════════ THREE SERIES ═══════════ */
  .series {
    padding: clamp(64px, 10vh, 100px) clamp(24px, 6vw, 80px);
    max-width: 1400px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 52px;
  }
  .series .rule {
    width: 100%; height: 1px; background: var(--hairline);
  }
  .series-item {
    display: flex; align-items: baseline; gap: 40px;
    text-decoration: none; color: var(--text);
    padding: 20px 0;
    transition: opacity 0.4s;
  }
  .series-item:hover { opacity: 0.55; }
  .series-item .num {
    font-family: var(--serif-en);
    font-size: 0.65rem; font-style: italic;
    color: var(--muted); letter-spacing: 0.2em;
    min-width: 48px;
  }
  .series-item .name-en {
    font-family: var(--serif-en);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300; font-style: italic;
    letter-spacing: 0.06em; min-width: 280px;
  }
  .series-item .name-cn {
    font-family: var(--serif-cn);
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 200; letter-spacing: 0.16em;
  }
  .series-item .count {
    font-family: var(--serif-en);
    font-size: 0.65rem; font-style: italic;
    color: var(--muted); letter-spacing: 0.15em;
    margin-left: auto;
  }

  /* ═══════════ FOOTER ═══════════ */
  footer {
    padding: 40px clamp(24px, 6vw, 80px) 60px;
    max-width: 1400px; margin: 0 auto;
    display: flex; justify-content: space-between;
    font-family: var(--serif-en);
    font-size: 0.65rem; font-style: italic;
    color: var(--muted); letter-spacing: 0.15em;
  }

  /* ═══════════ RESPONSIVE ═══════════ */
  @media (max-width: 800px) {
    .grid-3x2 { grid-template-columns: 1fr 1fr; gap: 32px; }
    .series-item { flex-wrap: wrap; gap: 8px; }
    .series-item .name-en { min-width: auto; font-size: 1.6rem; }
    nav .menu { gap: 16px; font-size: 0.7rem; }
  }
  @media (max-width: 500px) {
    .grid-3x2 { grid-template-columns: 1fr; gap: 40px; }
    .hero-text h1 { font-size: 2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- ═══════════ NAV ═══════════ -->
<nav>
  <a href="index.html" class="logo">Our Wedding</a>
  <div class="menu">
    <a href="index.html" class="active">Home.</a>
    <a href="#series">Portfolio.</a>
  </div>
</nav>

<!-- ═══════════ HERO SLIDESHOW ═══════════ -->
<section class="hero" id="hero">
  <div class="slide active"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <p class="kicker">A Curated Collection</p>
    <h1>我们<br>的婚纱照</h1>
    <p class="sub">Timeless moments, forever held</p>
  </div>
  <div class="hero-dots" id="heroDots">
    <span class="active"></span><span></span><span></span><span></span><span></span>
  </div>
</section>

<!-- ═══════════ CURATED MOMENTS ═══════════ -->
<section class="section">
  <p class="section-label">Curated Moments</p>
  <h2 class="section-title">精选瞬间</h2>
  <div class="grid-3x2" id="gridMoments">
    <div class="grid-item"><img src="a12.jpg" alt="" loading="lazy"><span class="tag">warmth</span></div>
    <div class="grid-item"><img src="d31.jpg" alt="" loading="lazy"><span class="tag">soft</span></div>
    <div class="grid-item"><img src="b11.jpg" alt="" loading="lazy"><span class="tag">green</span></div>
    <div class="grid-item"><img src="c14.jpg" alt="" loading="lazy"><span class="tag">pure</span></div>
    <div class="grid-item"><img src="c43.jpg" alt="" loading="lazy"><span class="tag">timeless</span></div>
    <div class="grid-item"><img src="d8.jpg" alt="" loading="lazy"><span class="tag">tender</span></div>
  </div>
</section>

<!-- ═══════════ THREE SERIES ═══════════ -->
<section class="series" id="series">
  <div class="rule"></div>
  <a href="warmth.html" class="series-item">
    <span class="num">01</span>
    <span class="name-en">Warmth</span>
    <span class="name-cn">煦</span>
    <span class="count">18 photographs</span>
  </a>
  <a href="silence.html" class="series-item">
    <span class="num">02</span>
    <span class="name-en">Silence</span>
    <span class="name-cn">静</span>
    <span class="count">15 photographs</span>
  </a>
  <a href="poetry.html" class="series-item">
    <span class="num">03</span>
    <span class="name-en">Poetry</span>
    <span class="name-cn">诗</span>
    <span class="count">15 photographs</span>
  </a>
  <div class="rule"></div>
</section>

<footer>
  <span>Our Wedding Collection</span>
  <span>执子之手 · 与子偕老</span>
</footer>

<script>
// ═══ Slideshow ═══
(function(){
  const slides = document.querySelectorAll('.hero .slide');
  const dots = document.querySelectorAll('.hero-dots span');
  let current = 0;
  const total = slides.length;

  function showSlide(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (idx + total) % total;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  let interval = setInterval(() => showSlide(current + 1), 5000);

  dots.forEach((dot, i) => {
    dot.addEventListener('click', () => {
      clearInterval(interval);
      showSlide(i);
      interval = setInterval(() => showSlide(current + 1), 5000);
    });
  });
})();

// ═══ Scroll reveal ═══
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.06, rootMargin: '60px' });

setTimeout(() => {
  document.querySelectorAll('.grid-item').forEach(el => observer.observe(el));
}, 500);

// ═══ Nav scroll effect ═══
const nav = document.querySelector('nav');
const heroBottom = document.querySelector('.hero');
window.addEventListener('scroll', () => {
  if (window.scrollY > 100) {
    nav.style.background = 'rgba(248,247,244,0.92)';
    nav.style.backdropFilter = 'blur(12px)';
    nav.querySelector('.logo').style.color = 'var(--text)';
    nav.querySelectorAll('.menu a').forEach(a => a.style.color = 'var(--muted)');
    nav.querySelector('.menu a.active').style.color = 'var(--text)';
  } else {
    nav.style.background = 'transparent';
    nav.style.backdropFilter = 'none';
    nav.querySelector('.logo').style.color = 'rgba(255,255,255,0.85)';
    nav.querySelectorAll('.menu a').forEach(a => {
      a.style.color = a.classList.contains('active') ? '#fff' : 'rgba(255,255,255,0.7)';
    });
  }
});
</script>

</body>
</html>
