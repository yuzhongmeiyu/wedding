<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的婚纱照</title>
<style>
  :root {
    --bg: #f9f6f1;
    --text: #2c241a;
    --muted: #8c7b6b;
    --gold: #bfa67a;
    --gold-light: #d4c4a8;
    --gold-pale: #e8ddd0;
    --dark: #1a1510;
    --white: #fffefc;
    --shadow: 0 4px 30px rgba(0,0,0,0.04);
    --font-serif: "Noto Serif SC", "Source Han Serif SC", Georgia, "STSong", serif;
    --font-sans: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
    --transition: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; background: var(--dark); }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* ═══════════ LOADING ═══════════ */
  #loader {
    position: fixed; inset: 0; z-index: 10000;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: loaderPulse 1.6s ease-in-out infinite;
  }
  .loader-text {
    margin-top: 20px;
    font-family: var(--font-serif);
    font-size: 0.8rem; color: var(--muted);
    letter-spacing: 0.3em;
  }
  @keyframes loaderPulse {
    0%,100% { opacity: 0.3; width: 60px; }
    50%     { opacity: 1;   width: 100px; }
  }

  /* ═══════════ HERO ═══════════ */
  .hero {
    position: relative; height: 100vh; min-height: 600px; max-height: 900px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #000;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: url('a12.jpg') center 35%/cover no-repeat;
    filter: brightness(0.45) saturate(0.85);
    will-change: transform;
    animation: heroIn 1.5s var(--transition) forwards;
  }
  @keyframes heroIn {
    from { transform: scale(1.08); filter: brightness(0.3) saturate(0.7); }
    to   { transform: scale(1.03); filter: brightness(0.45) saturate(0.85); }
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
  }
  .hero-content { position: relative; z-index: 2; text-align: center; color: #fff; }
  .hero-content .kicker {
    font-size: 0.68rem; letter-spacing: 0.4em; text-transform: uppercase;
    opacity: 0.6; margin-bottom: 40px; animation: fadeUp 1.2s 0.3s var(--transition) both;
  }
  .hero-content h1 {
    font-family: var(--font-serif);
    font-size: clamp(2.8rem, 6vw, 4.8rem);
    font-weight: 350; letter-spacing: 0.2em;
    line-height: 1.15; margin-bottom: 16px;
    animation: fadeUp 1.2s 0.5s var(--transition) both;
  }
  .hero-content .sub {
    font-size: clamp(0.85rem, 1.6vw, 1rem);
    font-weight: 300; letter-spacing: 0.25em; opacity: 0.65;
    animation: fadeUp 1.2s 0.7s var(--transition) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ═══════════ INTRO ═══════════ */
  .intro {
    text-align: center; padding: 120px 32px 80px;
    max-width: 640px; margin: 0 auto;
  }
  .intro .ornament {
    width: 40px; height: 1px; background: var(--gold);
    margin: 0 auto 32px;
  }
  .intro h2 {
    font-family: var(--font-serif);
    font-size: clamp(1.5rem, 3vw, 1.9rem);
    font-weight: 350; letter-spacing: 0.15em;
    color: var(--text); margin-bottom: 20px; line-height: 1.8;
  }
  .intro p {
    font-size: 0.9rem; color: var(--muted);
    letter-spacing: 0.08em; line-height: 2.2;
  }

  /* ═══════════ FEATURE PHOTO ═══════════ */
  .feature {
    padding: 0 48px;
    max-width: 1200px; margin: 0 auto;
  }
  .feature .img-box {
    position: relative; overflow: hidden;
    border-radius: 4px; cursor: pointer;
    opacity: 0; transform: translateY(50px);
    transition: opacity 1s var(--transition), transform 1s var(--transition);
  }
  .feature .img-box.visible { opacity: 1; transform: translateY(0); }
  .feature .img-box img {
    display: block; width: 100%; height: auto;
    transition: transform 1s var(--transition);
  }
  .feature .img-box:hover img { transform: scale(1.03); }
  .feature .img-box .label {
    position: absolute; bottom: 32px; left: 40px;
    font-family: var(--font-serif);
    font-size: 1.3rem; color: #fff;
    letter-spacing: 0.15em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .feature .img-box:hover .label { opacity: 1; transform: translateY(0); }

  /* ═══════════ DIVIDER ═══════════ */
  .divider {
    text-align: center; padding: 60px 20px;
    max-width: 500px; margin: 0 auto;
  }
  .divider .line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    margin: 0 auto 24px;
  }
  .divider blockquote {
    font-family: var(--font-serif);
    font-size: 1rem; color: var(--text);
    letter-spacing: 0.1em; line-height: 2; font-style: italic;
  }
  .divider .attr {
    font-size: 0.72rem; color: var(--muted);
    letter-spacing: 0.15em; margin-top: 12px;
  }

  /* ═══════════ GALLERY ═══════════ */
  .gallery-section {
    padding: 0 48px 80px;
    max-width: 1400px; margin: 0 auto;
  }
  .gallery-section .label-row {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 40px; padding-left: 4px;
  }
  .gallery-section .label-row .num {
    font-family: var(--font-serif);
    font-size: 3rem; font-weight: 300;
    color: var(--gold-pale); line-height: 1;
  }
  .gallery-section .label-row .title {
    font-family: var(--font-serif);
    font-size: 1.2rem; letter-spacing: 0.15em;
    color: var(--text);
  }
  .gallery-section .label-row .dash {
    flex: 1; height: 1px; background: var(--gold-pale);
    min-width: 30px;
  }

  .gallery {
    columns: 3;
    column-gap: 24px;
  }

  .card {
    break-inside: avoid;
    margin-bottom: 24px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--white);
    box-shadow: var(--shadow);
    cursor: pointer;
    position: relative;
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.8s var(--transition),
                transform 0.8s var(--transition),
                box-shadow 0.5s ease;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.1); }

  .card img {
    display: block; width: 100%; height: auto;
    transition: transform 0.8s var(--transition), filter 0.8s var(--transition);
    filter: brightness(0.96);
  }
  .card.visible img { filter: brightness(1); }
  .card:hover img { transform: scale(1.04); }

  /* Caption on hover */
  .card .caption {
    position: absolute; inset: 0;
    display: flex; align-items: flex-end;
    padding: 48px 24px 20px;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35) 100%);
    color: #fff; opacity: 0;
    transition: opacity 0.45s ease;
    pointer-events: none;
    font-family: var(--font-serif);
    font-size: 1.05rem; letter-spacing: 0.12em;
  }
  .card:hover .caption { opacity: 1; }

  /* ═══════════ PAIR ROW ═══════════ */
  .pair-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 0 48px;
    max-width: 1400px; margin: 0 auto 24px;
  }
  .pair-row .pair-card {
    position: relative; overflow: hidden;
    border-radius: 4px; cursor: pointer;
    opacity: 0; transform: translateY(50px);
    transition: opacity 1s var(--transition), transform 1s var(--transition);
  }
  .pair-row .pair-card.visible { opacity: 1; transform: translateY(0); }
  .pair-row .pair-card img {
    display: block; width: 100%; height: auto;
    transition: transform 1s var(--transition);
  }
  .pair-row .pair-card:hover img { transform: scale(1.03); }

  /* ═══════════ LIGHTBOX ═══════════ */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(10,8,6,0.97);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.5s ease;
  }
  .lightbox.active { display: flex; opacity: 1; }

  .lightbox .lb-img-wrap img {
    max-width: 90vw; max-height: 84vh;
    object-fit: contain; border-radius: 3px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    animation: lbIn 0.6s var(--transition);
  }
  @keyframes lbIn {
    from { opacity: 0; transform: scale(0.88) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .lb-close {
    position: fixed; top: 24px; right: 32px; z-index: 2002;
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55); font-size: 1.3rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .lb-close:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }

  .lb-nav {
    position: fixed; top: 50%; z-index: 2002;
    transform: translateY(-50%);
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.45); font-size: 1.5rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  .lb-info {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-family: var(--font-serif);
    font-size: 0.8rem; letter-spacing: 0.2em; z-index: 2002;
    text-align: center;
  }

  /* ═══════════ BACK TO TOP ═══════════ */
  .back-top {
    position: fixed; bottom: 40px; right: 40px; z-index: 100;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--white); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    border: none; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden; transform: translateY(10px);
    transition: all 0.4s var(--transition);
    color: var(--muted);
  }
  .back-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
  .back-top:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.1); color: var(--gold); }

  /* ═══════════ FOOTER ═══════════ */
  .footer {
    text-align: center; padding: 40px 20px 60px;
    background: var(--bg);
  }
  .footer .ornament {
    width: 30px; height: 1px;
    background: var(--gold-light); margin: 0 auto 16px;
  }
  .footer p {
    font-family: var(--font-serif);
    font-size: 0.95rem; color: var(--muted);
    letter-spacing: 0.2em;
  }

  /* ═══════════ RESPONSIVE ═══════════ */
  @media (max-width: 1000px) {
    .gallery { columns: 2; column-gap: 16px; }
    .card { margin-bottom: 16px; }
    .feature { padding: 0 20px; }
    .gallery-section { padding: 0 20px 56px; }
    .pair-row { grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-bottom: 12px; }
    .intro { padding: 80px 24px 60px; }
  }
  @media (max-width: 600px) {
    .gallery { columns: 1; }
    .card { margin-bottom: 12px; }
    .feature { padding: 0 12px; }
    .feature .img-box .label { bottom: 16px; left: 16px; font-size: 1rem; }
    .gallery-section { padding: 0 12px 40px; }
    .pair-row { grid-template-columns: 1fr; gap: 12px; padding: 0 12px; margin-bottom: 12px; }
    .hero-content h1 { font-size: 2.2rem; }
    .hero-content .kicker { margin-bottom: 24px; }
    .intro { padding: 56px 20px 40px; }
    .lb-nav { width: 38px; height: 38px; }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
    .back-top { bottom: 24px; right: 24px; width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-line"></div>
  <div class="loader-text">正在准备</div>
</div>

<!-- ═══════════ HERO ═══════════ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="kicker">Our Wedding</div>
    <h1>我们</h1>
    <p class="sub">执子之手 · 与子偕老</p>
  </div>
</section>

<!-- ═══════════ INTRO ═══════════ -->
<section class="intro">
  <div class="ornament"></div>
  <h2>从相遇那天起，<br>所有的光都照向了你</h2>
  <p>这些照片，是我们故事里的四十八个瞬间。<br>每一帧都真实，每一眼都珍贵。</p>
</section>

<!-- ═══════════ FEATURED PHOTO ═══════════ -->
<div class="feature">
  <div class="img-box" data-idx="8">
    <img src="a55.jpg" alt="" loading="lazy">
    <span class="label">鎏金时刻</span>
  </div>
</div>

<!-- ═══════════ DIVIDER ═══════════ -->
<div class="divider">
  <div class="line"></div>
  <blockquote>愿我如星君如月<br>夜夜流光相皎洁</blockquote>
  <div class="attr">—— 范成大</div>
</div>

<!-- ═══════════ GALLERY 1: 暖光 ═══════════ -->
<div class="gallery-section">
  <div class="label-row">
    <span class="num">01</span>
    <span class="title">暖光絮语</span>
    <span class="dash"></span>
  </div>
  <div class="gallery" id="gallery1"></div>
</div>

<!-- ═══════════ PAIR ROW ═══════════ -->
<div class="pair-row">
  <div class="pair-card" data-idx="26">
    <img src="c1.jpg" alt="" loading="lazy">
  </div>
  <div class="pair-card" data-idx="27">
    <img src="c14.jpg" alt="" loading="lazy">
  </div>
</div>

<!-- ═══════════ DIVIDER ═══════════ -->
<div class="divider">
  <div class="line"></div>
  <blockquote>死生契阔，与子成说<br>执子之手，与子偕老</blockquote>
  <div class="attr">—— 《诗经》</div>
</div>

<!-- ═══════════ GALLERY 2: 绿意 ═══════════ -->
<div class="gallery-section">
  <div class="label-row">
    <span class="num">02</span>
    <span class="title">绿野仙踪</span>
    <span class="dash"></span>
  </div>
  <div class="gallery" id="gallery2"></div>
</div>

<!-- ═══════════ FEATURED PHOTO ═══════════ -->
<div class="feature">
  <div class="img-box" data-idx="30">
    <img src="c5.jpg" alt="" loading="lazy">
    <span class="label">纯白誓约</span>
  </div>
</div>

<!-- ═══════════ GALLERY 3: 纯白 ═══════════ -->
<div class="gallery-section">
  <div class="label-row">
    <span class="num">03</span>
    <span class="title">纯白誓约</span>
    <span class="dash"></span>
  </div>
  <div class="gallery" id="gallery3"></div>
</div>

<!-- ═══════════ DIVIDER ═══════════ -->
<div class="divider">
  <div class="line"></div>
  <blockquote>两情若是久长时<br>又岂在朝朝暮暮</blockquote>
  <div class="attr">—— 秦观</div>
</div>

<!-- ═══════════ GALLERY 4: 时光 ═══════════ -->
<div class="gallery-section">
  <div class="label-row">
    <span class="num">04</span>
    <span class="title">时光隽永</span>
    <span class="dash"></span>
  </div>
  <div class="gallery" id="gallery4"></div>
</div>

<!-- ═══════════ PAIR ROW ═══════════ -->
<div class="pair-row">
  <div class="pair-card" data-idx="45">
    <img src="d8.jpg" alt="" loading="lazy">
  </div>
  <div class="pair-card" data-idx="46">
    <img src="d9.jpg" alt="" loading="lazy">
  </div>
</div>

<!-- ═══════════ FOOTER ═══════════ -->
<div class="footer">
  <div class="ornament"></div>
  <p>执子之手，与子偕老</p>
</div>

<button class="back-top" id="backTop">↑</button>

<!-- ═══════════ LIGHTBOX ═══════════ -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-img-wrap"><img src="" alt="" id="lbImg"></div>
  <div class="lb-info" id="lbInfo"></div>
</div>

<script>
// ═══ Photo groups ═══
const groups = [
  // Section 1: 暖光
  ["a39__.jpg","a41.jpg","a45.jpg","a48.jpg","a12.jpg","a14.jpg","a17.jpg","d13.jpg","d23.jpg","d31.jpg","d32.jpg","d35.jpg","d36.jpg","d46.jpg","d54.jpg"],
  // Section 2: 绿意
  ["b11.jpg","b18.jpg","b21.jpg","b23.jpg","b26.jpg","b30.jpg","b33.jpg","b42__.jpg","b53.jpg","b57.jpg","b6.jpg"],
  // Section 3: 纯白
  ["c2.jpg","c9.jpg","c20.jpg","c26.jpg","c31.jpg","c32.jpg","c43.jpg","c50_.jpg","d52.jpg","d53_.jpg"],
  // Section 4: 时光
  ["c55.jpg","c61.jpg","c62.jpg","c64.jpg","d55.jpg","e10__.jpg","a55.jpg","c1.jpg","c14.jpg","c5.jpg","d8.jpg","d9.jpg"]
];

const captionsMap = {};
const captionSets = [
  ["凝望","轻吻","温柔","浅笑","依偎","心动","低语","缱绻","相拥","时光","暖阳","柔情","温存","倾心","呢喃"],
  ["清风","绿茵","漫步","林间","芬芳","夏日","私语","晴空","微风","花间","翠影"],
  ["纯白","誓言","初心","永恒","约定","白纱","凝眸","深情","此生","唯一"],
  ["沉淀","岁月","长路","默然","相守","余晖","暮光","恒久","归处","鎏金","初见","白首","暖映","牵绊","缠绵"]
];
groups.forEach((g, gi) => {
  g.forEach((p, i) => { captionsMap[p] = captionSets[gi][i] || ''; });
});

const allPhotos = groups.flat();
let currentIdx = 0;

// ═══ Build gallery sections ═══
groups.forEach((photos, gIdx) => {
  const container = document.getElementById(`gallery${gIdx + 1}`);
  if (!container) return;
  photos.forEach((src, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.transitionDelay = `${(i % 8) * 0.05}s`;
    const cap = captionsMap[src] || '';
    card.innerHTML = `<img src="${src}" alt="" loading="lazy"><span class="caption">${cap}</span>`;
    card.addEventListener('click', () => openLightbox(allPhotos.indexOf(src)));
    container.appendChild(card);
  });
});

// ═══ Click handlers for feature & pair cards ═══
document.querySelectorAll('.img-box, .pair-card').forEach(el => {
  const idx = parseInt(el.dataset.idx);
  if (!isNaN(idx)) {
    el.addEventListener('click', () => openLightbox(idx));
    el.style.cursor = 'pointer';
  }
});

// ═══ Intersection Observer ═══
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.05, rootMargin: '60px' });

setTimeout(() => {
  document.querySelectorAll('.card, .img-box, .pair-card').forEach(el => observer.observe(el));
}, 300);

// ═══ Back to top ═══
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => backTop.classList.toggle('show', window.scrollY > 600));
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ═══ Loading ═══
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 700);
});

// ═══ Lightbox ═══
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbInfo = document.getElementById('lbInfo');

function openLightbox(idx) {
  currentIdx = idx;
  updateLightbox();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  currentIdx = (currentIdx + dir + allPhotos.length) % allPhotos.length;
  updateLightbox();
}

function updateLightbox() {
  const src = allPhotos[currentIdx];
  lbImg.src = src;
  const cap = captionsMap[src] || '';
  lbInfo.textContent = `${currentIdx + 1} / ${allPhotos.length}${cap ? '  ·  ' + cap : ''}`;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) navLightbox(dx < 0 ? 1 : -1);
});
</script>

</body>
