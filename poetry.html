<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poetry · 诗</title>

<style>
  :root {
    --dark: #2A2A2A;
    --text-on-dark: #C8C4BE;
    --muted-on-dark: #8A8680;
    --accent: #B8860B;
    --serif-en: Georgia, "Times New Roman", serif;
    --serif-cn: "STSong", "SimSun", "Noto Serif SC", "Source Han Serif SC", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; background: var(--dark); }
  body {
    font-family: var(--serif-cn); background: var(--dark); color: var(--text-on-dark);
    -webkit-font-smoothing: antialiased;
    font-size: 15px; line-height: 1.7; letter-spacing: 0.12em;
    opacity: 0; animation: bodyIn 0.8s 0.2s ease forwards;
  }
  @keyframes bodyIn { to { opacity: 1; } }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 28px clamp(24px, 6vw, 80px);
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(42,42,42,0.9); backdrop-filter: blur(12px);
  }
  nav .logo { font-family: var(--serif-en); font-size: 1rem; font-style: italic; color: var(--text-on-dark); letter-spacing: 0.08em; text-decoration: none; }
  nav .menu { display: flex; gap: 32px; font-family: var(--serif-en); font-size: 0.78rem; letter-spacing: 0.15em; }
  nav .menu a { color: var(--muted-on-dark); text-decoration: none; transition: color 0.4s; }
  nav .menu a:hover { color: var(--text-on-dark); }

  .page-header {
    padding: 160px clamp(24px, 6vw, 80px) 60px;
    max-width: 1000px;
  }
  .page-header .kicker {
    font-family: var(--serif-en); font-size: 0.7rem; font-style: italic;
    letter-spacing: 0.25em; color: var(--muted-on-dark); margin-bottom: 16px;
  }
  .page-header h1 {
    font-family: var(--serif-en); font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 300; font-style: italic; letter-spacing: 0.06em; color: var(--text-on-dark);
  }
  .page-header .cn {
    font-family: var(--serif-cn); font-size: clamp(1.4rem, 2.5vw, 1.8rem);
    font-weight: 200; letter-spacing: 0.2em; opacity: 0.6;
  }
  .page-header .dek {
    margin-top: 24px; font-size: 0.85rem; color: var(--muted-on-dark);
    letter-spacing: 0.08em; line-height: 2; max-width: 440px;
  }

  /* ═══ Segment: Image + Text row ═══ */
  .segment {
    padding: 0 clamp(24px, 6vw, 80px);
    max-width: 1500px; margin: 0 auto 100px;
  }

  /* -- Bright banner (3 photos, full-width) -- */
  .banner-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 4px; margin-bottom: 80px;
  }
  .banner-row img {
    width: 100%; height: auto; display: block;
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1),
                transform 0.8s cubic-bezier(0.22,0.61,0.36,1);
  }
  .banner-row img.visible { opacity: 1; transform: translateY(0); }

  /* -- Green gallery (3-up grids) -- */
  .green-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 48px; margin-bottom: 48px;
  }
  .green-grid .tile {
    cursor: pointer; overflow: hidden;
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1),
                transform 0.8s cubic-bezier(0.22,0.61,0.36,1);
  }
  .green-grid .tile.visible { opacity: 1; transform: translateY(0); }
  .green-grid .tile img {
    display: block; width: 100%; height: auto;
    transition: transform 0.6s ease;
  }
  .green-grid .tile:hover img { transform: scale(1.03); }

  /* -- Dark finale (large with film border) -- */
  .film-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 40px; padding: 60px 0;
  }
  .film-frame {
    cursor: pointer; overflow: hidden;
    border: 16px solid #1A1A1A;
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.9s cubic-bezier(0.22,0.61,0.36,1),
                transform 0.9s cubic-bezier(0.22,0.61,0.36,1);
  }
  .film-frame.visible { opacity: 1; transform: translateY(0); }
  .film-frame img {
    display: block; width: 100%; height: auto;
    filter: brightness(0.9);
    transition: transform 0.6s ease, filter 0.6s ease;
  }
  .film-frame:hover img { transform: scale(1.04); filter: brightness(1); }

  /* ═══ Poem sidebar ═══ */
  .poem-block {
    padding: 0 clamp(24px, 6vw, 80px);
    max-width: 800px; margin: 0 auto 40px;
    text-align: right;
  }
  .poem-block .poem-title {
    font-family: var(--serif-en); font-size: 0.65rem; font-style: italic;
    letter-spacing: 0.25em; color: var(--muted-on-dark); margin-bottom: 16px;
  }
  .poem-block .poem-text {
    font-family: var(--serif-cn); font-size: 1.1rem; font-weight: 200;
    letter-spacing: 0.15em; line-height: 2.4; color: var(--text-on-dark);
    font-style: italic;
  }

  /* ═══ Lightbox ═══ */
  .lightbox { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(8,8,8,0.97); justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; }
  .lightbox.active { display: flex; opacity: 1; }
  .lightbox img { max-width: 90vw; max-height: 86vh; object-fit: contain; animation: lbIn 0.5s cubic-bezier(0.22,0.61,0.36,1); }
  @keyframes lbIn { from { opacity: 0; transform: scale(0.9) translateY(24px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .lb-close { position: fixed; top: 24px; right: 32px; z-index: 2002; font-size: 1.5rem; color: rgba(255,255,255,0.5); background: none; border: none; cursor: pointer; transition: color 0.3s; font-family: var(--serif-en); }
  .lb-close:hover { color: #fff; }
  .lb-nav { position: fixed; top: 50%; z-index: 2002; transform: translateY(-50%); font-size: 1.6rem; color: rgba(255,255,255,0.4); background: none; border: none; cursor: pointer; padding: 16px 20px; transition: color 0.3s; }
  .lb-nav:hover { color: #fff; }
  .lb-prev { left: 8px; } .lb-next { right: 8px; }
  .lb-info { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.25em; z-index: 2002; font-family: var(--serif-en); }

  @media (max-width: 800px) {
    .banner-row, .green-grid, .film-row { grid-template-columns: 1fr 1fr; gap: 24px; }
  }
  @media (max-width: 500px) {
    .banner-row, .green-grid, .film-row { grid-template-columns: 1fr; gap: 32px; }
  }

  /* ═══════════ MUSIC PLAYER ═══════════ */
  .music-btn {
    position: fixed; bottom: 36px; right: 36px; z-index: 200;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--bg, #F8F7F4);
    border: 1px solid var(--hairline, #D8D5CE);
    cursor: pointer; font-family: var(--serif-en);
    font-size: 0.85rem; color: var(--muted, #7D7D7D);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .music-btn:hover { color: #B8860B; border-color: #B8860B; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .music-btn.playing { color: #B8860B; border-color: #B8860B; }
  .music-btn.playing::after {
    content: '';
    position: absolute; inset: -2px; border-radius: 50%;
    border: 1px solid rgba(184,134,11,0.3);
    animation: musicPulse 2s ease-in-out infinite;
  }
  @keyframes musicPulse {
    0%,100% { transform: scale(1); opacity: 0; }
    50%     { transform: scale(1.12); opacity: 1; }
  }

</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Our Wedding</a>
  <div class="menu">
    <a href="index.html">Home.</a>
    <a href="index.html#series">Portfolio.</a>
  </div>
</nav>

<div class="page-header">
  <p class="kicker">Chapter 03 · 15 photographs</p>
  <h1>Poetry</h1>
  <p class="cn">诗</p>
  <p class="dek">色彩在暗色上浮现，如同诗句在纸面绽放。绿野间的奔跑、纯白纱裙的回眸、暮色里的牵手——这是视觉的诗篇。</p>
</div>

<!-- Bright banner (3 photos) -->
<div class="segment">
  <div class="banner-row" id="brightBanner"></div>
</div>

<div class="poem-block">
  <p class="poem-title">I. Pure</p>
  <p class="poem-text">白色是最纯粹的开始，<br>盛满所有的可能。</p>
</div>

<!-- Green grids (9 photos → 3 rows of 3) -->
<div class="segment">
  <div class="green-grid" id="greenGrid1"></div>
</div>
<div class="segment">
  <div class="green-grid" id="greenGrid2"></div>
</div>
<div class="segment">
  <div class="green-grid" id="greenGrid3"></div>
</div>

<div class="poem-block">
  <p class="poem-title">II. Verdant</p>
  <p class="poem-text">在自然的怀抱里，<br>我们是最自由的模样。</p>
</div>

<!-- Dark finale (3 photos with film borders) -->
<div class="segment">
  <div class="film-row" id="darkFinale"></div>
</div>

<div class="poem-block" style="margin-bottom: 120px;">
  <p class="poem-title">III. Eternal</p>
  <p class="poem-text">光影交错间，<br>爱意悄然生长。</p>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
  <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
  <img src="" alt="" id="lbImg">
  <span class="lb-info" id="lbInfo"></span>
</div>

<script>
const allPhotos = [
  // Bright (3)
  "c1.jpg","c14.jpg","c2.jpg",
  // Green (9)
  "b11.jpg","b18.jpg","b21.jpg",
  "b23.jpg","b30.jpg","b33.jpg",
  "b42__.jpg","b57.jpg","b6.jpg",
  // Dark (3)
  "c55.jpg","c61.jpg","c62.jpg"
];

const allCaps = ["纯白","誓言","初心","清风","绿茵","漫步","林间","芬芳","夏日","私语","晴空","微风","花间","翠影","沉淀","岁月","长路"];

let currentIdx = 0;

// Build bright banner
const brightBanner = document.getElementById('brightBanner');
[0,1,2].forEach(i => {
  const img = document.createElement('img');
  img.src = allPhotos[i]; img.alt = ''; img.loading = 'lazy';
  img.addEventListener('click', () => openLightbox(i));
  img.style.cursor = 'pointer';
  brightBanner.appendChild(img);
});

// Build green grids (3 rows of 3)
for (let g = 0; g < 3; g++) {
  const grid = document.getElementById(`greenGrid${g+1}`);
  for (let j = 0; j < 3; j++) {
    const idx = 3 + g * 3 + j;
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.transitionDelay = `${j * 0.06}s`;
    tile.innerHTML = `<img src="${allPhotos[idx]}" alt="" loading="lazy">`;
    tile.addEventListener('click', () => openLightbox(idx));
    grid.appendChild(tile);
  }
}

// Build dark finale
const darkFinale = document.getElementById('darkFinale');
[12,13,14].forEach((i, j) => {
  const frame = document.createElement('div');
  frame.className = 'film-frame';
  frame.style.transitionDelay = `${j * 0.1}s`;
  frame.innerHTML = `<img src="${allPhotos[i]}" alt="" loading="lazy">`;
  frame.addEventListener('click', () => openLightbox(i));
  darkFinale.appendChild(frame);
});

// Observer
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); } });
}, { threshold: 0.04, rootMargin: '50px' });
setTimeout(() => {
  document.querySelectorAll('.banner-row img, .tile, .film-frame').forEach(el => observer.observe(el));
}, 300);

// Lightbox
const lightbox = document.getElementById('lightbox'); const lbImg = document.getElementById('lbImg'); const lbInfo = document.getElementById('lbInfo');
function openLightbox(idx) { currentIdx = idx; update(); lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeLightbox() { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
function navLightbox(dir) { currentIdx = (currentIdx + dir + allPhotos.length) % allPhotos.length; update(); }
function update() { lbImg.src = allPhotos[currentIdx]; lbInfo.textContent = `${currentIdx+1} / ${allPhotos.length} · ${allCaps[currentIdx]}`; }
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));
document.addEventListener('keydown', e => { if (!lightbox.classList.contains('active')) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') navLightbox(-1); if (e.key === 'ArrowRight') navLightbox(1); });
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
let tx = 0; lightbox.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; });
lightbox.addEventListener('touchend', e => { const dx = e.changedTouches[0].screenX - tx; if (Math.abs(dx) > 50) navLightbox(dx < 0 ? 1 : -1); });
</script>

<button class="music-btn" id="musicBtn" title="音乐">&#9835;</button>
<audio id="bgMusic" loop src="Perfect.mp3"></audio>

</body>
</html>
