<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silence · 静</title>

<style>
  :root {
    --bg: #F5F5F3;
    --text: #2B2B2B;
    --muted: #7D7D7D;
    --hairline: #D8D5CE;
    --serif-en: Georgia, "Times New Roman", serif;
    --serif-cn: "STSong", "SimSun", "Noto Serif SC", "Source Han Serif SC", serif;
    --gap: 72px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; background: var(--bg); }
  body {
    font-family: var(--serif-cn); background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 15px; line-height: 1.7; letter-spacing: 0.12em;
    opacity: 0; animation: bodyIn 0.8s 0.2s ease forwards;
  }
  @keyframes bodyIn { to { opacity: 1; } }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 28px clamp(24px, 6vw, 80px);
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(245,245,243,0.9); backdrop-filter: blur(12px);
  }
  nav .logo { font-family: var(--serif-en); font-size: 1rem; font-style: italic; color: var(--text); letter-spacing: 0.08em; text-decoration: none; }
  nav .menu { display: flex; gap: 32px; font-family: var(--serif-en); font-size: 0.78rem; letter-spacing: 0.15em; }
  nav .menu a { color: var(--muted); text-decoration: none; transition: color 0.4s; }
  nav .menu a:hover { color: var(--text); }

  .page-header {
    padding: 160px clamp(24px, 6vw, 80px) 60px;
    max-width: 1000px;
  }
  .page-header .kicker {
    font-family: var(--serif-en); font-size: 0.7rem; font-style: italic;
    letter-spacing: 0.25em; color: var(--muted); margin-bottom: 16px;
  }
  .page-header h1 {
    font-family: var(--serif-en); font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 300; font-style: italic; letter-spacing: 0.06em;
  }
  .page-header .cn {
    font-family: var(--serif-cn); font-size: clamp(1.4rem, 2.5vw, 1.8rem);
    font-weight: 200; letter-spacing: 0.2em; opacity: 0.7;
  }
  .page-header .dek {
    margin-top: 24px; font-size: 0.85rem; color: var(--muted);
    letter-spacing: 0.08em; line-height: 2; max-width: 440px;
  }

  /* ═══ Offset 3-column grid ═══ */
  .gallery-wrap {
    padding: 0 clamp(24px, 6vw, 80px) 120px;
    max-width: 1500px; margin: 0 auto;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
  }
  /* Rows 1,3,5: items auto-place in cols 1-3, col 4 stays empty */
  /* Rows 2,4: items shift right to cols 2-4, col 1 stays empty */
  .gallery .card:nth-child(4)  { grid-column: 2; }
  .gallery .card:nth-child(5)  { grid-column: 3; }
  .gallery .card:nth-child(6)  { grid-column: 4; }
  .gallery .card:nth-child(10) { grid-column: 2; }
  .gallery .card:nth-child(11) { grid-column: 3; }
  .gallery .card:nth-child(12) { grid-column: 4; }

  .card {
    cursor: pointer; overflow: hidden; position: relative;
    opacity: 0; transform: translateY(36px);
    transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1),
                transform 0.8s cubic-bezier(0.22,0.61,0.36,1);
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card img {
    display: block; width: 100%; height: auto;
    filter: grayscale(0.08);
    transition: transform 0.6s ease, filter 0.6s ease;
  }
  .card:hover img { transform: scale(1.03); filter: grayscale(0); }

  .card .caption {
    margin-top: 12px;
    font-family: var(--serif-en); font-size: 0.65rem; font-style: italic;
    letter-spacing: 0.2em; color: var(--muted); text-align: right;
  }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(10,9,7,0.96);
    justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .lightbox.active { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 90vw; max-height: 86vh; object-fit: contain;
    animation: lbIn 0.5s cubic-bezier(0.22,0.61,0.36,1);
  }
  @keyframes lbIn { from { opacity: 0; transform: scale(0.9) translateY(24px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .lb-close { position: fixed; top: 24px; right: 32px; z-index: 2002; font-size: 1.5rem; color: rgba(255,255,255,0.5); background: none; border: none; cursor: pointer; transition: color 0.3s; font-family: var(--serif-en); }
  .lb-close:hover { color: #fff; }
  .lb-nav { position: fixed; top: 50%; z-index: 2002; transform: translateY(-50%); font-size: 1.6rem; color: rgba(255,255,255,0.4); background: none; border: none; cursor: pointer; padding: 16px 20px; transition: color 0.3s; }
  .lb-nav:hover { color: #fff; }
  .lb-prev { left: 8px; } .lb-next { right: 8px; }
  .lb-info { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.25em; z-index: 2002; font-family: var(--serif-en); }

  @media (max-width: 900px) {
    .gallery { grid-template-columns: 1fr 1fr; gap: 40px; }
    .gallery .card:nth-child(4),
    .gallery .card:nth-child(5),
    .gallery .card:nth-child(6),
    .gallery .card:nth-child(10),
    .gallery .card:nth-child(11),
    .gallery .card:nth-child(12) { grid-column: auto; }
  }
  @media (max-width: 500px) { .gallery { grid-template-columns: 1fr; gap: 48px; } }

  /* ═══════════ MUSIC PLAYER ═══════════ */
  .music-btn {
    position: fixed; bottom: 36px; right: 36px; z-index: 200;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--bg, #F8F7F4);
    border: 1px solid var(--hairline, #D8D5CE);
    cursor: pointer; font-family: var(--serif-en);
    font-size: 0.85rem; color: var(--muted, #7D7D7D);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .music-btn:hover { color: #B8860B; border-color: #B8860B; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .music-btn.playing { color: #B8860B; border-color: #B8860B; }
  .music-btn.playing::after {
    content: '';
    position: absolute; inset: -2px; border-radius: 50%;
    border: 1px solid rgba(184,134,11,0.3);
    animation: musicPulse 2s ease-in-out infinite;
  }
  @keyframes musicPulse {
    0%,100% { transform: scale(1); opacity: 0; }
    50%     { transform: scale(1.12); opacity: 1; }
  }

</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Our Wedding</a>
  <div class="menu">
    <a href="index.html">Home.</a>
    <a href="index.html#series">Portfolio.</a>
  </div>
</nav>

<div class="page-header">
  <p class="kicker">Chapter 02 · 15 photographs</p>
  <h1>Silence</h1>
  <p class="cn">静</p>
  <p class="dek">光影静默处，爱意悄然生长。这些低饱和的瞬间，诉说着无需言语的默契与深情。</p>
</div>

<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
  <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
  <img src="" alt="" id="lbImg">
  <span class="lb-info" id="lbInfo"></span>
</div>

<script>
const photos = ["c5.jpg","c9.jpg","c20.jpg","c26.jpg","c31.jpg","c32.jpg","c43.jpg","c50_.jpg","c64.jpg","d52.jpg","d53_.jpg","d55.jpg","e10__.jpg","b26.jpg","b53.jpg"];
const caps = ["永恒","约定","白纱","凝眸","深情","此生","唯一","沉淀","岁月","长路","默然","相守","余晖","暮光","归处"];
let currentIdx = 0;

const gallery = document.getElementById('gallery');
photos.forEach((src, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.transitionDelay = `${(i % 6) * 0.05}s`;
  card.innerHTML = `<img src="${src}" alt="" loading="lazy"><p class="caption">${String(i+1).padStart(2,'0')} · ${caps[i]}</p>`;
  card.addEventListener('click', () => openLightbox(i));
  gallery.appendChild(card);
});

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); } });
}, { threshold: 0.04, rootMargin: '50px' });
setTimeout(() => document.querySelectorAll('.card').forEach(el => observer.observe(el)), 300);

// Lightbox
const lightbox = document.getElementById('lightbox'); const lbImg = document.getElementById('lbImg'); const lbInfo = document.getElementById('lbInfo');
function openLightbox(idx) { currentIdx = idx; update(); lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeLightbox() { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
function navLightbox(dir) { currentIdx = (currentIdx + dir + photos.length) % photos.length; update(); }
function update() { lbImg.src = photos[currentIdx]; lbInfo.textContent = `${currentIdx+1} / ${photos.length} · ${caps[currentIdx]}`; }
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));
document.addEventListener('keydown', e => { if (!lightbox.classList.contains('active')) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') navLightbox(-1); if (e.key === 'ArrowRight') navLightbox(1); });
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
let tx = 0; lightbox.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; });
lightbox.addEventListener('touchend', e => { const dx = e.changedTouches[0].screenX - tx; if (Math.abs(dx) > 50) navLightbox(dx < 0 ? 1 : -1); });</script>

<button class="music-btn" id="musicBtn" title="音乐">&#9835;</button>
<audio id="bgMusic" loop src="Perfect.mp3"></audio>


<button class="music-btn" id="musicBtn" title="音乐">&#9835;</button>
<audio id="bgMusic" loop src="Perfect.mp3"></audio>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('musicBtn');
  var audio = document.getElementById('bgMusic');
  if (!btn || !audio) return;
  var playing = false;
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (playing) { audio.pause(); playing = false; btn.classList.remove('playing'); }
    else { audio.play().then(function(){ playing = true; btn.classList.add('playing'); }).catch(function(){}); }
  });
  document.addEventListener('click', function firstPlay() {
    if (!playing) { audio.play().then(function(){ playing = true; btn.classList.add('playing'); }).catch(function(){}); }
  });
});
</script>
</body>
</html>
